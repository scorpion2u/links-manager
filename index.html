<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>链接管家</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#d4d4d4">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="链接管家">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="icon" type="image/png" href="icon-192.png" sizes="192x192">
    <link rel="icon" type="image/png" href="icon-512.png" sizes="512x512">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-start: #dbdbdb;
            --bg-end: #c2c2c2;
            --card-bg-start: #e0e0e0;
            --card-bg-end: #c8c8c8;
            --text-primary: #2c3e2f;
            --text-secondary: #4b5563;
            --border-light: rgba(0,0,0,0.05);
            --shadow-outer: 8px 8px 16px rgba(0,0,0,0.12), -4px -4px 12px rgba(255,255,255,0.7);
            --shadow-inner: inset 3px 3px 6px rgba(0,0,0,0.08), inset -2px -2px 4px rgba(255,255,255,0.5);
            --btn-bg: linear-gradient(180deg, #e6e6e6 0%, #cccccc 100%);
            --toast-bg: #5a5a5a;
        }
        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-start);
            background-image: radial-gradient(circle at 30% 20%, var(--bg-start) 5%, var(--bg-end) 90%);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 16px;
            margin: 0;
        }
        .app {
            width: 100%;
            max-width: 800px;
            border-radius: 32px;
            padding: 20px;
            background: linear-gradient(145deg, var(--bg-start) 0%, var(--bg-end) 100%);
            box-shadow: 16px 16px 32px rgba(0,0,0,0.18), -10px -10px 28px rgba(255,255,255,0.4);
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        .title-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 22px;
            border-radius: 32px;
            background: linear-gradient(180deg, var(--card-bg-start) 0%, var(--card-bg-end) 100%);
            box-shadow: var(--shadow-outer);
        }
        .title-left { display: flex; align-items: center; gap: 14px; }
        .app-icon { font-size: 1.8rem; }
        .app-title { font-weight: 800; font-size: 1.4rem; color: var(--text-primary); }
        .title-actions { display: flex; gap: 12px; }
        .header-btn {
            width: 40px; height: 40px; border: none; border-radius: 50%; cursor: pointer;
            background: var(--btn-bg);
            box-shadow: 3px 3px 6px rgba(0,0,0,0.1), -2px -2px 4px rgba(255,255,255,0.6);
            font-size: 1.2rem;
            color: var(--text-primary);
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .header-btn:active { transform: scale(0.94); box-shadow: inset 3px 3px 6px rgba(0,0,0,0.15), inset -2px -2px 5px rgba(255,255,255,0.5); }
        /* 添加分类按钮 */
        .add-category-btn {
            background: var(--btn-bg);
            box-shadow: var(--shadow-outer);
            border-radius: 60px;
            padding: 14px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-primary);
            margin-top: 8px;
        }
        .add-category-btn:active { transform: scale(0.97); box-shadow: inset 3px 3px 8px rgba(0,0,0,0.15), inset -2px -2px 5px rgba(255,255,255,0.5); }
        /* 分类卡片 */
        .category-card {
            background: linear-gradient(180deg, var(--card-bg-start) 0%, var(--card-bg-end) 100%);
            border-radius: 28px;
            overflow: hidden;
            box-shadow: var(--shadow-outer);
            margin-bottom: 16px;
        }
        .category-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;
            gap: 10px;
        }
        .drag-handle {
            cursor: grab;
            font-size: 1.1rem;
            opacity: 0.4;
            padding: 0 4px;
        }
        .drag-handle:active { cursor: grabbing; }
        .collapse-btn {
            cursor: pointer;
            font-size: 0.8rem;
            opacity: 0.5;
            padding: 4px 8px;
            border-radius: 20px;
            transition: transform 0.2s;
        }
        .collapse-btn:active { transform: scale(0.9); }
        .category-title {
            font-size: 1rem;
            font-weight: 700;
            flex: 1;
            color: var(--text-primary);
        }
        .category-stats {
            font-size: 0.65rem;
            background: var(--bg-start);
            padding: 4px 10px;
            border-radius: 30px;
            box-shadow: var(--shadow-inner);
        }
        .category-actions { display: flex; gap: 6px; }
        .icon-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: var(--btn-bg);
            box-shadow: 2px 2px 5px rgba(0,0,0,0.08), -2px -2px 4px rgba(255,255,255,0.5);
            cursor: pointer;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .icon-btn:active { transform: scale(0.92); box-shadow: inset 2px 2px 4px rgba(0,0,0,0.1); }
        .category-card.collapsed .category-body { display: none; }
        .category-body {
            padding: 0 16px 16px;
            border-top: 1px solid var(--border-light);
        }
        /* 链接列表 */
        .links-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 12px;
        }
        .link-item {
            display: flex;
            align-items: center;
            background: var(--bg-start);
            border-radius: 20px;
            padding: 10px 14px;
            gap: 8px;
            box-shadow: var(--shadow-inner);
        }
        .link-drag-handle {
            cursor: grab;
            font-size: 0.9rem;
            opacity: 0.3;
            padding: 0 4px;
        }
        .link-info {
            flex: 1;
            min-width: 0;
        }
        .link-name {
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--text-primary);
            word-break: break-word;
        }
        .link-url {
            font-size: 0.65rem;
            color: var(--text-secondary);
            word-break: break-all;
        }
        .link-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }
        .btn-sm-icon {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--btn-bg);
            border: none;
            cursor: pointer;
            font-size: 0.75rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 2px 2px 4px rgba(0,0,0,0.08), -1px -1px 3px rgba(255,255,255,0.5);
        }
        .btn-sm-icon:active { transform: scale(0.92); box-shadow: inset 2px 2px 4px rgba(0,0,0,0.1); }
        .add-link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: var(--btn-bg);
            border-radius: 40px;
            padding: 10px;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            box-shadow: var(--shadow-inner);
        }
        .add-link-btn:active { transform: scale(0.97); box-shadow: inset 3px 3px 6px rgba(0,0,0,0.1); }
        .empty-links {
            text-align: center;
            padding: 20px;
            font-size: 0.7rem;
            opacity: 0.5;
        }
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            background: linear-gradient(180deg, var(--card-bg-start) 0%, var(--card-bg-end) 100%);
            border-radius: 32px;
            color: var(--text-secondary);
        }
        /* 弹窗 - 新拟物风格 */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s;
        }
        .modal-overlay.show { opacity: 1; pointer-events: auto; }
        .modal-box, .menu-popup {
            background: linear-gradient(145deg, var(--card-bg-start), var(--card-bg-end));
            border-radius: 32px;
            padding: 24px;
            width: 90%;
            max-width: 340px;
            box-shadow: 20px 20px 40px rgba(0,0,0,0.3), -12px -12px 24px rgba(255,255,255,0.5);
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .menu-popup .btn {
            margin: 0;
            justify-content: center;
        }
        .modal-title { font-weight: 700; font-size: 1rem; text-align: center; color: var(--text-primary); }
        .modal-box input, .modal-box textarea {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 28px;
            background: var(--bg-start);
            box-shadow: inset 3px 3px 6px rgba(0,0,0,0.08), inset -2px -2px 4px rgba(255,255,255,0.5);
            font-family: inherit;
            font-size: 0.9rem;
            color: var(--text-primary);
        }
        .row-buttons { display: flex; gap: 12px; }
        .row-buttons .btn { flex: 1; margin: 0; }
        .btn {
            border: none;
            border-radius: 40px;
            padding: 12px 16px;
            cursor: pointer;
            background: var(--btn-bg);
            box-shadow: 4px 4px 8px rgba(0,0,0,0.1), -3px -3px 6px rgba(255,255,255,0.6);
            font-weight: 600;
            color: var(--text-primary);
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .btn:active { transform: scale(0.97); box-shadow: inset 3px 3px 8px rgba(0,0,0,0.15), inset -2px -2px 5px rgba(255,255,255,0.5); }
        .btn-danger { color: #c0392b; font-weight: 700; }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--toast-bg);
            color: white;
            padding: 10px 24px;
            border-radius: 60px;
            font-size: 0.8rem;
            z-index: 1100;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }
        .toast.show { opacity: 1; }
        footer { text-align: center; font-size: 0.6rem; color: var(--text-secondary); margin-top: 8px; }
        .export-preview {
            background: var(--bg-start);
            border-radius: 16px;
            padding: 12px;
            max-height: 250px;
            overflow: auto;
            font-size: 0.7rem;
            white-space: pre-wrap;
            box-shadow: inset 3px 3px 6px rgba(0,0,0,0.08), inset -2px -2px 4px rgba(255,255,255,0.5);
        }
    </style>
</head>
<body>
<div class="app">
    <div class="title-card">
        <div class="title-left"><span class="app-icon">📂</span><span class="app-title">链接管家</span></div>
        <div class="title-actions">
            <button class="header-btn" id="menuBtn">☰</button>
        </div>
    </div>

    <div id="categoriesContainer" class="categories-container"></div>

    <div class="add-category-btn" id="addCategoryBtn">➕ 添加新分类</div>
    <footer>拖拽 ⋮⋮ 可排序 | 点击 ▼ 折叠分类 | 支持任何链接</footer>
</div>

<!-- 菜单弹窗 - 新拟物风格 -->
<div class="modal-overlay" id="menuOverlay">
    <div class="menu-popup">
        <button class="btn" id="exportNotesBtn">📋 导出笔记</button>
        <button class="btn" id="exportBackupBtn">💾 导出备份</button>
        <button class="btn" id="importBtn">📂 导入数据</button>
        <button class="btn btn-danger" id="clearAllBtn">⚠️ 清理所有数据</button>
        <button class="btn" id="menuCloseBtn">关闭</button>
    </div>
</div>

<!-- 导入模式选择 -->
<div class="modal-overlay" id="importModeOverlay">
    <div class="modal-box">
        <div class="modal-title">📂 选择导入方式</div>
        <div class="row-buttons" style="flex-direction:column;">
            <button class="btn" id="overwriteImportBtn">📌 覆盖导入</button>
            <button class="btn" id="mergeImportBtn">🔄 合并导入</button>
            <button class="btn" id="cancelImportBtn">取消</button>
        </div>
    </div>
</div>

<!-- 导出笔记 -->
<div class="modal-overlay" id="notesOverlay">
    <div class="modal-box">
        <div class="modal-title">📝 导出笔记</div>
        <div class="export-preview" id="notesPreview"></div>
        <div class="row-buttons">
            <button class="btn" id="copyNotesBtn">📋 复制</button>
            <button class="btn" id="downloadNotesBtn">💾 下载</button>
            <button class="btn" id="closeNotesBtn">关闭</button>
        </div>
    </div>
</div>

<!-- 分类编辑弹窗 -->
<div class="modal-overlay" id="categoryModal">
    <div class="modal-box">
        <div class="modal-title" id="categoryModalTitle">添加分类</div>
        <input type="text" id="categoryNameInput" placeholder="分类名称">
        <div class="row-buttons">
            <button class="btn" id="categorySaveBtn">保存</button>
            <button class="btn" id="categoryCancelBtn">取消</button>
        </div>
    </div>
</div>

<!-- 链接编辑弹窗 -->
<div class="modal-overlay" id="linkModal">
    <div class="modal-box">
        <div class="modal-title" id="linkModalTitle">添加链接</div>
        <input type="text" id="linkNameInput" placeholder="链接名称">
        <input type="text" id="linkUrlInput" placeholder="https://...">
        <textarea id="linkDescInput" rows="2" placeholder="说明（可选）"></textarea>
        <div class="row-buttons">
            <button class="btn" id="linkSaveBtn">保存</button>
            <button class="btn" id="linkCancelBtn">取消</button>
        </div>
    </div>
</div>

<!-- 清理确认 -->
<div class="modal-overlay" id="clearConfirmOverlay">
    <div class="modal-box">
        <div class="modal-title">⚠️ 危险操作</div>
        <div class="modal-message">清空后将删除所有分类和链接！</div>
        <input type="text" id="clearConfirmInput" placeholder='输入"确认删除"'>
        <div class="row-buttons">
            <button class="btn" id="clearConfirmCancel">取消</button>
            <button class="btn btn-danger" id="clearConfirmOk" disabled>确认</button>
        </div>
    </div>
</div>

<input type="file" id="importFile" accept=".json" style="display:none;">
<div class="toast" id="toastMsg"></div>

<script>
// ======================= 数据模块 =======================
const Storage = {
    key: 'category_link_manager_v3',
    save(data) {
        try { localStorage.setItem(this.key, JSON.stringify(data)); return true; }
        catch(e) { if(e.name === 'QuotaExceededError') alert('存储空间已满！请导出备份后清理。'); return false; }
    },
    load() {
        const raw = localStorage.getItem(this.key);
        return raw ? JSON.parse(raw) : { categories: [], nextCategoryId: 1, nextLinkId: 1 };
    }
};

const AppData = {
    categories: [],
    nextCategoryId: 1,
    nextLinkId: 1,
    init() {
        const saved = Storage.load();
        this.categories = saved.categories || [];
        this.nextCategoryId = saved.nextCategoryId || 1;
        this.nextLinkId = saved.nextLinkId || 1;
        this.save();
    },
    save() { Storage.save({ categories: this.categories, nextCategoryId: this.nextCategoryId, nextLinkId: this.nextLinkId }); },
    addCategory(name) {
        this.categories.push({ id: this.nextCategoryId++, name, links: [], collapsed: false });
        this.save();
    },
    updateCategory(id, name) {
        const cat = this.categories.find(c => c.id === id);
        if (cat) cat.name = name;
        this.save();
    },
    deleteCategory(id) {
        this.categories = this.categories.filter(c => c.id !== id);
        this.save();
    },
    toggleCollapse(id) {
        const cat = this.categories.find(c => c.id === id);
        if (cat) cat.collapsed = !cat.collapsed;
        this.save();
    },
    reorderCategories(newOrder) { this.categories = newOrder; this.save(); },
    addLink(categoryId, name, url, description) {
        const cat = this.categories.find(c => c.id === categoryId);
        if (cat) {
            cat.links.push({ id: this.nextLinkId++, name, url, description: description || '' });
            this.save();
        }
    },
    updateLink(categoryId, linkId, name, url, description) {
        const cat = this.categories.find(c => c.id === categoryId);
        if (cat) {
            const link = cat.links.find(l => l.id === linkId);
            if (link) { link.name = name; link.url = url; link.description = description || ''; this.save(); }
        }
    },
    deleteLink(categoryId, linkId) {
        const cat = this.categories.find(c => c.id === categoryId);
        if (cat) cat.links = cat.links.filter(l => l.id !== linkId);
        this.save();
    },
    reorderLinks(categoryId, newOrder) {
        const cat = this.categories.find(c => c.id === categoryId);
        if (cat) cat.links = newOrder;
        this.save();
    },
    getAllData() { return { categories: this.categories, nextCategoryId: this.nextCategoryId, nextLinkId: this.nextLinkId }; },
    importData(data, mode) {
        if (mode === 'overwrite') {
            this.categories = data.categories || [];
            this.nextCategoryId = data.nextCategoryId || 1;
            this.nextLinkId = data.nextLinkId || 1;
        } else {
            for (const newCat of (data.categories || [])) {
                const exists = this.categories.find(c => c.name === newCat.name);
                if (exists) {
                    for (const newLink of (newCat.links || [])) {
                        const linkExists = exists.links.find(l => l.url === newLink.url);
                        if (!linkExists) exists.links.push({ id: this.nextLinkId++, ...newLink });
                    }
                } else {
                    const newLinks = (newCat.links || []).map(l => ({ id: this.nextLinkId++, ...l }));
                    this.categories.push({ id: this.nextCategoryId++, name: newCat.name, links: newLinks, collapsed: false });
                }
            }
        }
        this.save();
    }
};

// UI 渲染
let editingCategoryId = null;
let currentCategoryIdForLink = null;
let editingLinkId = null;

function showToast(msg) { const t = document.getElementById('toastMsg'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }

function render() {
    const container = document.getElementById('categoriesContainer');
    if (!AppData.categories.length) {
        container.innerHTML = `<div class="empty-state">📭 暂无分类<br><span style="font-size:0.7rem;">点击下方「添加新分类」开始</span></div>`;
        return;
    }
    let html = '';
    for (const cat of AppData.categories) {
        const linkCount = cat.links.length;
        html += `<div class="category-card ${cat.collapsed ? 'collapsed' : ''}" data-category-id="${cat.id}">
            <div class="category-header">
                <span class="drag-handle" data-drag="category">⋮⋮</span>
                <span class="collapse-btn" data-toggle-category="${cat.id}">▼</span>
                <span class="category-title">📁 ${escapeHtml(cat.name)}</span>
                <span class="category-stats">${linkCount}个链接</span>
                <div class="category-actions">
                    <button class="icon-btn edit-category" data-category-id="${cat.id}" data-category-name="${escapeHtml(cat.name)}">✏️</button>
                    <button class="icon-btn delete-category" data-category-id="${cat.id}" data-category-name="${escapeHtml(cat.name)}">🗑️</button>
                </div>
            </div>
            <div class="category-body">
                <div class="links-list" data-category-id="${cat.id}">`;
        for (const link of cat.links) {
            html += `<div class="link-item" data-link-id="${link.id}">
                <span class="link-drag-handle" data-drag="link">⋮⋮</span>
                <div class="link-info">
                    <div class="link-name">${escapeHtml(link.name)}</div>
                    <div class="link-url">${escapeHtml(link.url)}</div>
                    ${link.description ? `<div style="font-size:0.6rem;opacity:0.6;">${escapeHtml(link.description)}</div>` : ''}
                </div>
                <div class="link-actions">
                    <button class="btn-sm-icon copy-link" data-url="${escapeHtml(link.url)}">📋</button>
                    <button class="btn-sm-icon edit-link" data-category-id="${cat.id}" data-link-id="${link.id}" data-name="${escapeHtml(link.name)}" data-url="${escapeHtml(link.url)}" data-desc="${escapeHtml(link.description || '')}">✏️</button>
                    <button class="btn-sm-icon delete-link" data-category-id="${cat.id}" data-link-id="${link.id}">🗑️</button>
                </div>
            </div>`;
        }
        if (cat.links.length === 0) html += `<div class="empty-links">暂无链接</div>`;
        html += `</div><div class="add-link-btn" data-category-id="${cat.id}">➕ 添加链接</div></div></div>`;
    }
    container.innerHTML = html;
    bindEvents();
}

function escapeHtml(str) { return String(str).replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

function bindEvents() {
    document.querySelectorAll('[data-toggle-category]').forEach(el => {
        el.onclick = (e) => { e.stopPropagation(); AppData.toggleCollapse(parseInt(el.dataset.toggleCategory)); render(); };
    });
    document.querySelectorAll('.edit-category').forEach(btn => {
        btn.onclick = () => { editingCategoryId = parseInt(btn.dataset.categoryId); document.getElementById('categoryNameInput').value = btn.dataset.categoryName; document.getElementById('categoryModalTitle').textContent = '编辑分类'; document.getElementById('categoryModal').classList.add('show'); };
    });
    document.querySelectorAll('.delete-category').forEach(btn => {
        btn.onclick = () => { if(confirm(`确定删除分类「${btn.dataset.categoryName}」及其所有链接吗？`)) { AppData.deleteCategory(parseInt(btn.dataset.categoryId)); render(); showToast('已删除'); } };
    });
    document.querySelectorAll('.add-link-btn').forEach(btn => {
        btn.onclick = () => { currentCategoryIdForLink = parseInt(btn.dataset.categoryId); editingLinkId = null; document.getElementById('linkModalTitle').textContent = '添加链接'; document.getElementById('linkNameInput').value = ''; document.getElementById('linkUrlInput').value = ''; document.getElementById('linkDescInput').value = ''; document.getElementById('linkModal').classList.add('show'); };
    });
    document.querySelectorAll('.edit-link').forEach(btn => {
        btn.onclick = () => { currentCategoryIdForLink = parseInt(btn.dataset.categoryId); editingLinkId = parseInt(btn.dataset.linkId); document.getElementById('linkModalTitle').textContent = '编辑链接'; document.getElementById('linkNameInput').value = btn.dataset.name; document.getElementById('linkUrlInput').value = btn.dataset.url; document.getElementById('linkDescInput').value = btn.dataset.desc; document.getElementById('linkModal').classList.add('show'); };
    });
    document.querySelectorAll('.delete-link').forEach(btn => {
        btn.onclick = () => { if(confirm('确定删除此链接？')) { AppData.deleteLink(parseInt(btn.dataset.categoryId), parseInt(btn.dataset.linkId)); render(); showToast('已删除'); } };
    });
    document.querySelectorAll('.copy-link').forEach(btn => {
        btn.onclick = () => { navigator.clipboard.writeText(btn.dataset.url); showToast('✅ 链接已复制'); };
    });
}

// 拖拽排序
let dragSrc = null;
document.addEventListener('dragstart', (e) => { if(e.target.closest('[data-drag]')) dragSrc = e.target.closest('[data-drag]'); });
document.addEventListener('dragover', (e) => e.preventDefault());
document.addEventListener('drop', (e) => {
    e.preventDefault();
    if(!dragSrc) return;
    const target = e.target.closest('.category-card') || e.target.closest('.link-item');
    if(!target) return;
    if(dragSrc.dataset.drag === 'category' && target.classList.contains('category-card')) {
        const cats = [...AppData.categories];
        const fromIdx = cats.findIndex(c => c.id == dragSrc.closest('.category-card').dataset.categoryId);
        const toIdx = cats.findIndex(c => c.id == target.dataset.categoryId);
        if(fromIdx !== -1 && toIdx !== -1) {
            const [moved] = cats.splice(fromIdx, 1);
            cats.splice(toIdx, 0, moved);
            AppData.reorderCategories(cats);
            render();
        }
    } else if(dragSrc.dataset.drag === 'link' && target.classList.contains('link-item')) {
        const parentCat = dragSrc.closest('.category-card');
        const targetCat = target.closest('.category-card');
        if(parentCat && parentCat.dataset.categoryId === targetCat.dataset.categoryId) {
            const catId = parseInt(parentCat.dataset.categoryId);
            const cat = AppData.categories.find(c => c.id === catId);
            const links = [...cat.links];
            const fromIdx = links.findIndex(l => l.id == dragSrc.closest('.link-item').dataset.linkId);
            const toIdx = links.findIndex(l => l.id == target.dataset.linkId);
            if(fromIdx !== -1 && toIdx !== -1) {
                const [moved] = links.splice(fromIdx, 1);
                links.splice(toIdx, 0, moved);
                AppData.reorderLinks(catId, links);
                render();
            }
        }
    }
    dragSrc = null;
});

// 其他功能
function generateNotes() {
    let text = `📂 我的链接分类\n生成时间: ${new Date().toLocaleString()}\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n`;
    for (const cat of AppData.categories) {
        text += `【${cat.name}】 (${cat.links.length}个链接)\n`;
        cat.links.forEach((link, idx) => { text += `  ${idx+1}. ${link.name}\n     链接: ${link.url}\n     说明: ${link.description || '无'}\n\n`; });
        text += '\n';
    }
    return text;
}

function exportBackup() {
    const data = AppData.getAllData();
    const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `links_backup_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.json`; a.click(); URL.revokeObjectURL(a.href); showToast('备份已导出');
}
function importWithMode(mode) {
    const fileInput = document.getElementById('importFile');
    fileInput.value = '';
    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            try {
                const data = JSON.parse(ev.target.result);
                AppData.importData(data, mode);
                render();
                showToast(mode === 'overwrite' ? '覆盖导入成功' : '合并导入成功');
            } catch(err) { alert('文件解析失败'); }
        };
        reader.readAsText(file);
    };
    fileInput.click();
}
function clearAllData() {
    if(document.getElementById('clearConfirmInput').value === '确认删除') {
        AppData.categories = []; AppData.nextCategoryId = 1; AppData.nextLinkId = 1; AppData.save(); render(); showToast('已清空');
        document.getElementById('clearConfirmOverlay').classList.remove('show');
    } else showToast('输入文字不匹配');
}

// 弹窗事件
document.getElementById('addCategoryBtn').onclick = () => { editingCategoryId = null; document.getElementById('categoryNameInput').value = ''; document.getElementById('categoryModalTitle').textContent = '添加分类'; document.getElementById('categoryModal').classList.add('show'); };
document.getElementById('categorySaveBtn').onclick = () => { const name = document.getElementById('categoryNameInput').value.trim(); if(!name) { alert('请输入分类名称'); return; } if(editingCategoryId) AppData.updateCategory(editingCategoryId, name); else AppData.addCategory(name); document.getElementById('categoryModal').classList.remove('show'); render(); showToast('已保存'); };
document.getElementById('categoryCancelBtn').onclick = () => document.getElementById('categoryModal').classList.remove('show');
document.getElementById('linkSaveBtn').onclick = () => {
    const name = document.getElementById('linkNameInput').value.trim(); const url = document.getElementById('linkUrlInput').value.trim(); const desc = document.getElementById('linkDescInput').value;
    if(!name) { alert('请输入链接名称'); return; }
    if(!url) { alert('请输入链接地址'); return; }
    try { new URL(url); } catch(e) { alert('链接格式无效，请以 http:// 或 https:// 开头'); return; }
    if(editingLinkId) AppData.updateLink(currentCategoryIdForLink, editingLinkId, name, url, desc);
    else AppData.addLink(currentCategoryIdForLink, name, url, desc);
    document.getElementById('linkModal').classList.remove('show'); render(); showToast('已保存');
};
document.getElementById('linkCancelBtn').onclick = () => document.getElementById('linkModal').classList.remove('show');
document.getElementById('menuBtn').onclick = () => document.getElementById('menuOverlay').classList.add('show');
document.getElementById('menuCloseBtn').onclick = () => document.getElementById('menuOverlay').classList.remove('show');
document.getElementById('exportNotesBtn').onclick = () => { document.getElementById('menuOverlay').classList.remove('show'); document.getElementById('notesPreview').innerText = generateNotes(); document.getElementById('notesOverlay').classList.add('show'); };
document.getElementById('exportBackupBtn').onclick = () => { document.getElementById('menuOverlay').classList.remove('show'); exportBackup(); };
document.getElementById('importBtn').onclick = () => { document.getElementById('menuOverlay').classList.remove('show'); document.getElementById('importModeOverlay').classList.add('show'); };
document.getElementById('overwriteImportBtn').onclick = () => { document.getElementById('importModeOverlay').classList.remove('show'); importWithMode('overwrite'); };
document.getElementById('mergeImportBtn').onclick = () => { document.getElementById('importModeOverlay').classList.remove('show'); importWithMode('merge'); };
document.getElementById('cancelImportBtn').onclick = () => document.getElementById('importModeOverlay').classList.remove('show');
document.getElementById('clearAllBtn').onclick = () => { document.getElementById('menuOverlay').classList.remove('show'); document.getElementById('clearConfirmInput').value = ''; document.getElementById('clearConfirmOk').disabled = true; document.getElementById('clearConfirmOverlay').classList.add('show'); };
document.getElementById('clearConfirmCancel').onclick = () => document.getElementById('clearConfirmOverlay').classList.remove('show');
document.getElementById('clearConfirmInput').oninput = (e) => { document.getElementById('clearConfirmOk').disabled = e.target.value !== '确认删除'; };
document.getElementById('clearConfirmOk').onclick = clearAllData;
document.getElementById('copyNotesBtn').onclick = () => { navigator.clipboard.writeText(document.getElementById('notesPreview').innerText); showToast('笔记已复制'); };
document.getElementById('downloadNotesBtn').onclick = () => { const blob = new Blob([document.getElementById('notesPreview').innerText], {type:'text/plain'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'links_notes.txt'; a.click(); };
document.getElementById('closeNotesBtn').onclick = () => document.getElementById('notesOverlay').classList.remove('show');
document.querySelectorAll('.modal-overlay').forEach(el => { el.addEventListener('click', (e) => { if(e.target === el) el.classList.remove('show'); }); });

AppData.init();
render();
if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW失败', err)); }); }
</script>
